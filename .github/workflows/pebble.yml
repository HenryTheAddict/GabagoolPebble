name: Pebble Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Pebble App
    runs-on: ubuntu-20.04

    container:
      image: python:2.7.18-buster

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get -qq install -y wget python-pip python2.7-dev libsdl1.2debian libfdt1 libpixman-1-0 nodejs npm libfreetype6 libx11-6 rlwrap

      - name: Install virtualenv
        run: pip install virtualenv

      - name: Get Pebble SDK
        run: |
          if [ ! -d sdk ]; then
            mkdir sdk
            wget -q -O - https://developer.rebble.io/s3.amazonaws.com/assets.getpebble.com/pebble-tool/pebble-sdk-4.5-linux64.tar.bz2 | tar xj --strip-components=1 -C sdk
          fi

      - name: Install SDK Python requirements
        run: |
          if [ ! -d sdk/.env ]; then
            cd sdk
            virtualenv .env
            bash -c "source .env/bin/activate && pip install -r requirements.txt && deactivate"
            cd ..
          fi

      - name: Get SDK Core
        run: |
          if [ ! -f sdk/sdk-core-4.3.tar.bz2 ]; then
            wget https://github.com/aveao/PebbleArchive/raw/master/SDKCores/sdk-core-4.3.tar.bz2 -O sdk/sdk-core-4.3.tar.bz2
          fi

      - name: Install SDK Core
        run: |
          if [ ! -d ~/.pebble-sdk ]; then
            mkdir -p ~/.pebble-sdk
            touch ~/.pebble-sdk/NO_TRACKING
            sdk/bin/pebble sdk install sdk/sdk-core-4.3.tar.bz2
          fi

      - name: Build Pebble App
        run: yes | sdk/bin/pebble build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GabagoolTouch
          path: build/*.pbw

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.pbw
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
